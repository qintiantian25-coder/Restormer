# general settings
name: RealDenosing_blindpixels_RGB
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: /root/Qtt/Restormer/data/train_sharp
    dataroot_lq: /root/Qtt/Restormer/data/train_blur
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk

    use_shuffle: true
    num_worker_per_gpu: 16          # 利用多核
    batch_size_per_gpu: 8           # 全局设置（参考值）
    pin_memory: true
    prefetch_mode: cuda

    # Progressive training - 已修改 mini_batch_sizes 第一个值为 8
    mini_batch_sizes: [8,2,2,1,1,1]   # 第一阶段 batch size = 8
    iters: [92000,64000,48000,36000,36000,24000]
    gt_size: 384
    gt_sizes: [128,160,192,256,320,384]

    dataset_enlarge_ratio: 1

  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: /root/Qtt/Restormer/data/val_sharp
    dataroot_lq: /root/Qtt/Restormer/data/val_blur
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: BiasFree
  dual_pixel_task: False

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 300000
  warmup_iter: -1
  use_grad_clip: true
  use_fp16: true                     # 混合精度加速

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 300000
    eta_min: 0.000001

  mixing_augs:
    mixup: false                     # 关闭 mixup 加速

  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: 20000                    # 减少验证频率
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 8

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    # 盲像素指标暂时注释（如需使用请取消注释并确保 blind_pixel.py 存在）
    # blind_mae:
    #   type: calculate_blind_mae
    #   csv_path: /root/Qtt/Restormer/data/val_mask/blind_pixel_coords.csv
    #   x_col: x
    #   y_col: y
    # blind_rmse:
    #   type: calculate_blind_rmse
    #   csv_path: /root/Qtt/Restormer/data/val_mask/blind_pixel_coords.csv
    #   x_col: x
    #   y_col: y
    # blind_psnr:
    #   type: calculate_blind_psnr
    #   csv_path: /root/Qtt/Restormer/data/val_mask/blind_pixel_coords.csv
    #   x_col: x
    #   y_col: y
    #   peak: 255.0
    # blind_count:
    #   type: calculate_blind_count
    #   csv_path: /root/Qtt/Restormer/data/val_mask/blind_pixel_coords.csv
    #   x_col: x
    #   y_col: y

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: 300000      # 避免中间 checkpoint，仅保留 best_model.pth
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
#  backend: nccl
#  port: 29500