# general settings
name: RealDenosing_BlindPixel_Gray
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage_BlindPixel
    dataroot_gt: data4/train_sharp
    dataroot_lq: data4/train_blur
    dataroot_mask: data4/train_mask
    in_ch: 1
    blind_weight: 10.0
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk

    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 4
    pin_memory: true
    prefetch_mode: cuda

    gt_size: 384
    dataset_enlarge_ratio: 1

  val:
    name: ValSet
    type: Dataset_PairedImage_BlindPixel
    dataroot_gt: data4/val_sharp
    dataroot_lq: data4/val_blur
    dataroot_mask: data4/val_mask
    in_ch: 1
    blind_weight: 10.0
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: Restormer
  inp_channels: 1
  out_channels: 1
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: BiasFree
  dual_pixel_task: False

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 100000
  warmup_iter: -1
  use_grad_clip: true
  use_fp16: true
  blind_weight: 10.0

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [50000, 50000]
    restart_weights: [1]
    eta_mins: [0.000001, 0.000001]

  mixing_augs:
    mixup: false

  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: 4000
  save_img: false
  rgb2bgr: false
  use_image: false
  max_minibatch: 8

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    blind_mae:
      type: calculate_blind_mae
      csv_path: data4/val_mask/001/blind_pixel_coords.csv
      x_col: x
      y_col: y
    blind_rmse:
      type: calculate_blind_rmse
      csv_path: data4/val_mask/001/blind_pixel_coords.csv
      x_col: x
      y_col: y
    blind_psnr:
      type: calculate_blind_psnr
      csv_path: data4/val_mask/001/blind_pixel_coords.csv
      x_col: x
      y_col: y
      peak: 255.0
    blind_count:
      type: calculate_blind_count
      csv_path: data4/val_mask/001/blind_pixel_coords.csv
      x_col: x
      y_col: y

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: 10000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  # backend: nccl
  # port: 29500
